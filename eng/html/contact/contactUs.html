 <!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARNIA LABS - CONTACT US</title>

    <link rel="stylesheet" href="../../../assets/css/reset.css">
    <link rel="stylesheet" href="../../../assets/css/common.css">
    <link rel="stylesheet" href="../../../assets/css/style.css">
    <link rel="stylesheet" href="../../../assets/css/sub.css">
    <link rel="stylesheet" href="../../../assets/css/responsive.css">
     <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">

    <script src="../../../assets/js/common.js"></script>
    <script src="../../../assets/plugin/jquery.js"></script>
    <script src="../../../assets/js/sub.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/lenis@1.3.18/dist/lenis.min.js"></script> 
</head>
<body class="eng">
    <div id="wrap">
        
        <!-- include -->
        <header id="header"></header>

        <section id="contact_main">
            <div class="container cm_container">
                <div class="cm_box top">
                    <div class="left">
                        <div class="cm_tit_area">
                            <div class="cm_tit">
                                <h2>contact us</h2>
                            </div>
                        </div>
                    </div>
                    <div class="right">
                        <span class="cross_deco wh"></span>
                        <!-- <div class="subPage_234_top_deco">
                            <div class="txt">
                                <figure>
                                    <img src="../../../assets/img/common/deco_txt01_gray01.svg" alt="#">
                                </figure>
                            </div>
                        </div> -->
                    </div>
                </div>
                <div class="cm_box bot">
                    <div class="left">
                        <div class="contact_progress">
                            <div class="ctpg_top">
                                <div class="ctpg_img">
                                    <figure>
                                        <img src="../../../assets/img/sub/ctpg_img.png" alt="나니아랩스 기술 이미지">
                                    </figure>
                                </div>
                                <p class="ctpg_txt">
                                    나니아랩스의 기술을 지금,
                                    <br>
                                    바로 경험해보세요.
                                </p>
                            </div>
                            <div class="ctpg_indicator">
                                
                            </div>
                        </div>
                    </div>
                    <div class="right">
                        <div class="contact_form_area">
                            <form class="cfa_form" novalidate>
                                <div class="cfa_item active" data-step="1">
                                    <span class="cfa_num">[ <b>01</b> <i>/</i> 06 ]</span>
                                    <label class="cfa_tit">
                                        안녕하세요!
                                        <br>
                                        회사 또는 소속 기관의 공식 명칭을 입력해 주세요.
                                    </label>
                                    <div class="cfa_field">
                                        <input type="text" name="company">
                                        <span class="cfa_placeholder">
                                            회사명을 입력해주세요
                                            <span class="cfa_star">*</span>
                                        </span>
                                    </div>
                                </div>
                                <div class="cfa_item" data-step="2">
                                    <span class="cfa_num">[ <b>02</b> <i>/</i> 06 ]</span>
                                    <label class="cfa_tit">
                                        본 문의를 담당하실 분의 성함을 입력해 주세요.
                                    </label>
                                    <div class="cfa_field">
                                        <input type="text" name="manager">
                                        <span class="cfa_placeholder">
                                            담당자명을 입력해주세요
                                            <span class="cfa_star">*</span>
                                        </span>
                                    </div>
                                </div>
                                <div class="cfa_item" data-step="3">
                                    <span class="cfa_num">[ <b>03</b> <i>/</i> 06 ]</span>
                                    <label class="cfa_tit">
                                        담당자의 직책 또는 역할을 입력해 주세요.
                                    </label>
                                    <div class="cfa_field">
                                        <input type="text" name="position">
                                        <span class="cfa_placeholder">
                                            직책을 입력해주세요
                                            <span class="cfa_star">*</span>
                                        </span>
                                    </div>
                                </div>
                                <div class="cfa_item" data-step="4">
                                    <span class="cfa_num">[ <b>04</b> <i>/</i> 06 ]</span>
                                    <label class="cfa_tit">
                                        회신을 받을 수 있는 회사 이메일을 입력해 주세요.
                                    </label>
                                    <div class="cfa_field">
                                        <input type="email" name="email">
                                        <span class="cfa_placeholder">
                                            회사 이메일을 입력해주세요
                                            <span class="cfa_star">*</span>
                                        </span>
                                    </div>
                                </div>
                                <div class="cfa_item" data-step="5">
                                    <span class="cfa_num">[ <b>05</b> <i>/</i> 06 ]</span>
                                    <label class="cfa_tit">
                                        필요 시 빠른 연락이 가능한 휴대전화번호를 입력해 주세요.
                                    </label>
                                    <div class="cfa_field">
                                        <input type="tel" name="phone">
                                        <span class="cfa_placeholder">
                                            전화번호를 입력해주세요
                                            <span class="cfa_star">*</span>
                                        </span>
                                    </div>
                                </div>
                                <div class="cfa_item" data-step="6">
                                    <span class="cfa_num">[ <b>06</b> <i>/</i> 06 ]</span>
                                    <label class="cfa_tit">
                                        요청하시는 내용과 관련된 배경, 목적, 필요사항을
                                        <br>
                                        구체적으로 작성해 주세요.
                                    </label>
                                    <div class="cfa_field">
                                        <textarea name="message" rows="3"></textarea>
                                        <span class="cfa_placeholder">
                                            문의내용을 입력해주세요
                                            <span class="cfa_star">*</span>
                                        </span>
                                    </div>
                                </div>
                                <button type="submit" class="cfa_submit" disabled>
                                    <span class="cfa_submit_txt">문의하기</span>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- techBlog_footer 주석처리
        <footer id="techBlog_footer">
            <p>Copyright © 2025 NARNIA LABS all rights reserved.</p>
        </footer>
        -->
        <!-- include -->
        <footer id="footer"></footer>
    </div>

<script>
window.addEventListener('load', function () {
    var API_URL = 'https://narnialabs.mycafe24.com/admin/api/inquiries';
    var form = document.querySelector('.cfa_form');
    var submitBtn = document.querySelector('#contact_main .cfa_submit');
    if (!form || !submitBtn) return;

    form.addEventListener('submit', function (e) { e.preventDefault(); });

    // 이메일 형식 클라이언트 사전 검증
    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    // Laravel 422 오류 → 한국어 메시지 변환
    var errorMessages = {
        'company':  '회사명을 입력해주세요.',
        'name':     '담당자명을 입력해주세요.',
        'email':    '이메일 형식이 맞지 않습니다.',
        'message':  '문의 내용을 입력해주세요.',
    };

    submitBtn.addEventListener('click', function (e) {
        e.preventDefault();
        if (submitBtn.disabled && !submitBtn.classList.contains('is-ready')) return;

        var get = function(name) {
            var el = form.querySelector('[name="' + name + '"]');
            return el ? el.value.trim() : '';
        };

        var data = {
            company:  get('company'),
            name:     get('manager'),
            position: get('position'),
            email:    get('email'),
            phone:    get('phone'),
            message:  get('message'),
        };

        // 필수값 클라이언트 사전 검증
        var headerH = (document.getElementById('header') || {}).offsetHeight || 85;
        var scrollToField = function(fieldName) {
            var step = form.querySelector('[name="' + fieldName + '"]');
            if (!step) return;
            var item = step.closest('.cfa_item') || step;
            var targetY = item.getBoundingClientRect().top + window.scrollY - headerH - 30;
            window.scrollTo({ top: targetY, behavior: 'smooth' });
            setTimeout(function() { step.focus(); }, 400);
        };

        if (!data.company) { alert('회사명을 입력해주세요.'); scrollToField('company'); return; }
        if (!data.name)    { alert('담당자명을 입력해주세요.'); scrollToField('manager'); return; }
        if (!data.email)   { alert('이메일을 입력해주세요.'); scrollToField('email'); return; }
        if (!isValidEmail(data.email)) { alert('이메일 형식이 맞지 않습니다.\n예) example@company.com'); scrollToField('email'); return; }
        if (!data.message) { alert('문의 내용을 입력해주세요.'); scrollToField('message'); return; }

        submitBtn.disabled = true;
        var txtEl = submitBtn.querySelector('.cfa_submit_txt');
        if (txtEl) txtEl.textContent = '전송 중...';

        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify(data),
        })
        .then(function (res) {
            if (res.status === 422) {
                // Laravel validation 오류 파싱
                return res.json().then(function(json) {
                    var errors = json.errors || {};
                    var msg = '';
                    Object.keys(errors).forEach(function(field) {
                        msg += (errorMessages[field] || errors[field][0]) + '\n';
                    });
                    throw new Error(msg.trim() || '입력 내용을 확인해주세요.');
                });
            }
            if (!res.ok) {
                throw new Error('서버 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
            }
            return res.json();
        })
        .then(function () {
            form.querySelectorAll('.cfa_item').forEach(function (el) { el.style.display = 'none'; });
            submitBtn.style.display = 'none';
            var done = document.createElement('div');
            done.style.cssText = 'padding:40px 0; text-align:left;';
            done.innerHTML = '<p style="font-size:22px; font-weight:600; color:#fff; line-height:1.6;">문의가 접수되었습니다.<br><span style="font-size:16px; font-weight:400; color:rgba(255,255,255,0.6);">빠른 시일 내에 답변 드리겠습니다.</span></p>';
            form.appendChild(done);

            // 성공 메시지가 보이도록 상단으로 스크롤
            var contactSection = document.getElementById('contact_main');
            var scrollTarget = contactSection || done;
            var headerH = (document.getElementById('header') || {}).offsetHeight || 85;
            var targetY = scrollTarget.getBoundingClientRect().top + window.scrollY - headerH - 20;
            window.scrollTo({ top: targetY, behavior: 'smooth' });
        })
        .catch(function (err) {
            submitBtn.disabled = false;
            submitBtn.classList.add('is-ready');
            if (txtEl) txtEl.textContent = '문의하기';
            alert(err.message);
        });
    });
});
</script>

</body>
</html>
