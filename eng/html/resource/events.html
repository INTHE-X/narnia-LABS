<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARNIA LABS - EVENTS</title>

    <link rel="stylesheet" href="../../../assets/css/reset.css">
    <link rel="stylesheet" href="../../../assets/css/common.css">
    <link rel="stylesheet" href="../../../assets/css/style.css">
    <link rel="stylesheet" href="../../../assets/css/sub.css">
    <link rel="stylesheet" href="../../../assets/css/responsive.css">
     <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">

    <script src="../../../assets/js/common.js"></script>
    <script src="../../../assets/plugin/jquery.js"></script>
    <script src="../../../assets/js/sub.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/lenis@1.3.18/dist/lenis.min.js"></script> 
</head>
<body class="eng">
    <div id="wrap">
        <!-- include -->
        <header id="header"></header>

        <section id="events_visual" class="type1">
            <div class="grid_deco">
                <div class="grid_deco_inner">
                    <div class="grid_line vrt vrt_dash pos_left"></div>
                    <div class="grid_line vrt vrt_dash pos_right"></div>
                    <div class="grid_line_bottom"></div>
                    <div class="cross_deco rb"></div>
                </div>
            </div>
            <div class="ev_cont">
                <div class="container">
                    <div class="ev_top">
                        <span>[Events]</span>
                        <span>[Exhibition]</span>
                        <div class="cross_deco lb"></div>
                        <div class="subPage_234_top_deco_absol">
                            <div class="txt">
                                <figure>
                                    <img src="../../../assets/img/common/deco_txt01_gray01.svg" alt="#">
                                </figure>
                            </div>
                        </div>
                    </div>
                    <div class="ev_main">
                        <div class="ev_main_inner">
                            <div class="ev_tit">
                                <h2>EVENTS</h2>
                                <div class="grid_barcode">
                                    <div class="top">
                                        <figure>
                                            <img src="../../../assets/img/common/deco_txt02_grd01.svg" alt="#">
                                        </figure>
                                    </div>
                                    <!-- <div class="bot">
                                        <figure>
                                            <img src="../../../assets/img/common/deco_barcode.svg" alt="#">
                                        </figure>
                                        <div class="bot_ani">
                                            <span>AI LABS</span>
                                        </div>
                                    </div> -->
                                </div>
                            </div>
                            <div class="ev_slide_area" data-aos="fade" data-aos-duration="1500" data-aos-delay="600">
                                <div class="ev_slide_wrap">
                                <!-- 좌측: 메인 슬라이드 -->
                                <div class="ev_left">
                                    <div class="ev_main_slide swiper">
                                        <div class="swiper-wrapper" id="ev-main-wrapper">
                                            <!-- API로 동적 생성 -->
                                        </div>
                                    </div>
                                </div>
                                <div class="ev_right">
                                    <div class="ev_info_card">
                                        <span class="dot_bot_l"></span>
                                        <span class="dot_bot_r"></span>
                                        <div class="ev_info_slide swiper">
                                            <div class="swiper-wrapper" id="ev-info-wrapper">
                                                <!-- API로 동적 생성 -->
                                            </div>
                                        </div>
                                    </div>
                                    <div class="ev_thumb_area">
                                        <div class="ev_thumb_slide swiper">
                                            <div class="swiper-wrapper" id="ev-thumb-wrapper">
                                                <!-- API로 동적 생성 -->
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                                <div class="ev_pagination"></div>
                                <div class="blur_txtDeco">
                                    <div class="inner">
                                        <div class="dots"></div>
                                        <div class="dots"></div>
                                        <figure>
                                            <img src="../../../assets/img/common/deco_txt01_wh.svg" alt="#">
                                        </figure>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="txtList_deco">
                        <figure>
                            <img src="../../../assets/img/common/deco_txt_list01.svg" alt="#">
                        </figure>
                    </div>
                </div>
            </div>
        </section>
        <section id="events_board" class="type1">
            <div class="container">
                <div class="inner">
                    <div class="filter_area">
                        <ul>
                            <li class="active">
                                <button>
                                    <span>All</span>
                                </button>
                            </li>
                            <li>
                                <button>
                                    <span>Conference</span>
                                </button>
                            </li>
                            <li>
                                <button>
                                    <span>Exhibition</span>
                                </button>
                            </li>
                        </ul>
                    </div>
                    <div class="evb_board_list">
                        <ul id="ev-board-list">
                            <!-- API로 동적 생성 -->
                        </ul>
                    </div>
                </div>
            </div>
        </section>
        <!-- include -->
        <section id="request"></section>

        <!-- include -->
        <footer id="footer"></footer>
    </div>

<script>
(function() {
    var API_URL = 'https://narnialabs.mycafe24.com/admin/api/events';
    var FALLBACK_IMG = '/assets/img/sub/ev_slide01.png';
    var ARROW_IMG = '/assets/img/common/link_arrow01.svg';
    var allEvents = [];
    var currentFilter = 'All';

    function imgSrc(ev) {
        return ev.image_url || FALLBACK_IMG;
    }

    function buildSlides(events) {
        var featured = events.filter(function(e){ return e.is_featured; });
        if (!featured.length) featured = events.slice(0, 3);

        var mainW  = document.getElementById('ev-main-wrapper');
        var infoW  = document.getElementById('ev-info-wrapper');
        var thumbW = document.getElementById('ev-thumb-wrapper');
        if (!mainW) return;

        mainW.innerHTML  = '';
        infoW.innerHTML  = '';
        thumbW.innerHTML = '';

        featured.forEach(function(ev) {
            mainW.innerHTML += '<div class="swiper-slide"><img src="' + imgSrc(ev) + '" alt=""></div>';
            infoW.innerHTML += '<div class="swiper-slide"><div class="ev_info_inner">'
                + '<span class="ev_tag"># ' + ev.category + '</span>'
                + '<h3 class="ev_info_tit">' + (ev.title_en || ev.title) + '</h3>'
                + '<p class="ev_info_date">' + ev.start_date + '</p>'
                + (ev.link ? '<a href="' + ev.link + '" class="ev_info_link" target="_blank"><span>[</span><em>Product Inquiry</em><i><img src="' + ARROW_IMG + '" alt=""></i><span>]</span></a>' : '')
                + '</div></div>';
            thumbW.innerHTML += '<div class="swiper-slide"><img src="' + imgSrc(ev) + '" alt=""></div>';
        });

        if (window.evSlideManager) {
            window.evSlideManager.reinit();
        }
    }

    function buildBoard(events) {
        var list = document.getElementById('ev-board-list');
        if (!list) return;

        var filtered = currentFilter === 'All'
            ? events
            : events.filter(function(e){ return e.category === currentFilter; });

        if (!filtered.length) {
            list.innerHTML = '<li style="padding:2rem;color:#888">등록된 이벤트가 없습니다.</li>';
            return;
        }

        list.innerHTML = filtered.map(function(ev) {
            return '<li data-category="' + ev.category + '">'
                + '<a href="' + (ev.link || '#') + '" ' + (ev.link ? 'target="_blank"' : '') + '>'
                + '<div class="box">'
                + '<div class="img"><figure><img src="' + imgSrc(ev) + '" alt="#"></figure></div>'
                + '<div class="txt">'
                + '<span class="cate"># ' + ev.category + '</span>'
                + '<h3 class="tit">' + (ev.title_en || ev.title) + '</h3>'
                + '<span class="date">' + ev.start_date + '</span>'
                + '</div></div></a></li>';
        }).join('');
    }

    function initFilter() {
        var filterItems = document.querySelectorAll('#events_board .filter_area ul li');
        filterItems.forEach(function(li) {
            var btn = li.querySelector('button');
            var label = btn ? btn.querySelector('span').textContent.trim() : '';
            if (btn) {
                btn.addEventListener('click', function() {
                    filterItems.forEach(function(i){ i.classList.remove('active'); });
                    li.classList.add('active');
                    currentFilter = label;
                    buildBoard(allEvents);
                });
            }
        });
    }

    fetch(API_URL)
        .then(function(r){ return r.json(); })
        .then(function(events) {
            allEvents = events;
            buildSlides(events);
            buildBoard(events);
            initFilter();
        })
        .catch(function(err) {
            console.warn('Events API 로드 실패:', err);
        });
})();
</script>

</body>
</html>
