 <!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARNIA LABS - CONTACT US</title>

    <link rel="stylesheet" href="../../../assets/css/reset.css">
    <link rel="stylesheet" href="../../../assets/css/common.css">
    <link rel="stylesheet" href="../../../assets/css/style.css">
    <link rel="stylesheet" href="../../../assets/css/sub.css">
    <link rel="stylesheet" href="../../../assets/css/responsive.css">
     <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">

    <script src="../../../assets/js/common.js"></script>
    <script src="../../../assets/plugin/jquery.js"></script>
    <script src="../../../assets/js/sub.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/lenis@1.3.18/dist/lenis.min.js"></script> 
</head>
<body class="jp">
    <div id="wrap">
        
        <!-- include -->
        <header id="header"></header>

        <section id="contact_main">
            <div class="container cm_container">
                <div class="cm_box top">
                    <div class="left">
                        <div class="cm_tit_area">
                            <div class="cm_tit">
                                <h2>contact us</h2>
                            </div>
                        </div>
                    </div>
                    <div class="right">
                        <span class="cross_deco wh"></span>
                        <!-- <div class="subPage_234_top_deco">
                            <div class="txt">
                                <figure>
                                    <img src="../../../assets/img/common/deco_txt01_gray01.svg" alt="#">
                                </figure>
                            </div>
                        </div> -->
                    </div>
                </div>
                <div class="cm_box bot">
                    <div class="left">
                        <div class="contact_progress">
                            <div class="ctpg_top">
                                <div class="ctpg_img">
                                    <figure>
                                        <img src="../../../assets/img/sub/ctpg_img.png" alt="ナニアラボ（NARNIA LABS） 技術イメージ">
                                    </figure>
                                </div>
                                <p class="ctpg_txt">
                                    ナニアラボ（NARNIA LABS）の技術を今、
                                    <br>
                                    すぐ体験してみてください。
                                </p>
                            </div>
                            <div class="ctpg_indicator">
                                
                            </div>
                        </div>
                    </div>
                    <div class="right">
                        <div class="contact_form_area">
                            <form class="cfa_form" novalidate>
                                <div class="cfa_item active" data-step="1">
                                    <span class="cfa_num">[ <b>01</b> <i>/</i> 06 ]</span>
                                    <label class="cfa_tit">
                                        こんにちは！
                                        <br>
                                        会社または所属機関の公式名称を入力してください。
                                    </label>
                                    <div class="cfa_field">
                                        <input type="text" name="company">
                                        <span class="cfa_placeholder">
                                            会社名を入力してください
                                            <span class="cfa_star">*</span>
                                        </span>
                                    </div>
                                </div>
                                <div class="cfa_item" data-step="2">
                                    <span class="cfa_num">[ <b>02</b> <i>/</i> 06 ]</span>
                                    <label class="cfa_tit">
                                        お問い合わせを担当される方の氏名を入力してください。
                                    </label>
                                    <div class="cfa_field">
                                        <input type="text" name="manager">
                                        <span class="cfa_placeholder">
                                            担当者名を入力してください
                                            <span class="cfa_star">*</span>
                                        </span>
                                    </div>
                                </div>
                                <div class="cfa_item" data-step="3">
                                    <span class="cfa_num">[ <b>03</b> <i>/</i> 06 ]</span>
                                    <label class="cfa_tit">
                                        担当者の役職または役割を入力してください。
                                    </label>
                                    <div class="cfa_field">
                                        <input type="text" name="position">
                                        <span class="cfa_placeholder">
                                            役職を入力してください
                                            <span class="cfa_star">*</span>
                                        </span>
                                    </div>
                                </div>
                                <div class="cfa_item" data-step="4">
                                    <span class="cfa_num">[ <b>04</b> <i>/</i> 06 ]</span>
                                    <label class="cfa_tit">
                                        返信を受け取れる会社のメールアドレスを入力してください。
                                    </label>
                                    <div class="cfa_field">
                                        <input type="email" name="email">
                                        <span class="cfa_placeholder">
                                            会社のメールアドレスを入力してください
                                            <span class="cfa_star">*</span>
                                        </span>
                                    </div>
                                </div>
                                <div class="cfa_item" data-step="5">
                                    <span class="cfa_num">[ <b>05</b> <i>/</i> 06 ]</span>
                                    <label class="cfa_tit">
                                        必要時に迅速な連絡が可能な携帯電話番号を入力してください。
                                    </label>
                                    <div class="cfa_field">
                                        <input type="tel" name="phone">
                                        <span class="cfa_placeholder">
                                            電話番号を入力してください
                                            <span class="cfa_star">*</span>
                                        </span>
                                    </div>
                                </div>
                                <div class="cfa_item" data-step="6">
                                    <span class="cfa_num">[ <b>06</b> <i>/</i> 06 ]</span>
                                    <label class="cfa_tit">
                                        ご要望の内容に関する背景、目的、必要事項を
                                        <br>
                                        具体的に記入してください。
                                    </label>
                                    <div class="cfa_field">
                                        <textarea name="message" rows="3"></textarea>
                                        <span class="cfa_placeholder">
                                            お問い合わせ内容を入力してください
                                            <span class="cfa_star">*</span>
                                        </span>
                                    </div>
                                </div>
                                <button type="submit" class="cfa_submit" disabled>
                                    <span class="cfa_submit_txt">お問い合わせ</span>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- techBlog_footer 주석처리
        <footer id="techBlog_footer">
            <p>Copyright © 2025 NARNIA LABS all rights reserved.</p>
        </footer>
        -->
        <!-- include -->
        <footer id="footer"></footer>
    </div>

<script>
window.addEventListener('load', function () {
    var API_URL = 'https://narnialabs.mycafe24.com/admin/api/inquiries';
    var form = document.querySelector('.cfa_form');
    var submitBtn = document.querySelector('#contact_main .cfa_submit');
    if (!form || !submitBtn) return;

    form.addEventListener('submit', function (e) { e.preventDefault(); });

    // メール形式クライアント事前検証
    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    // Laravel 422 エラー → 日本語メッセージ変換
    var errorMessages = {
        'company':  '会社名を入力してください.',
        'name':     '担当者名を入力してください.',
        'email':    'メールアドレスの形式が正しくありません。',
        'message':  'お問い合わせ内容を入力してください。',
    };

    submitBtn.addEventListener('click', function (e) {
        e.preventDefault();
        if (submitBtn.disabled && !submitBtn.classList.contains('is-ready')) return;

        var get = function(name) {
            var el = form.querySelector('[name="' + name + '"]');
            return el ? el.value.trim() : '';
        };

        var data = {
            company:  get('company'),
            name:     get('manager'),
            position: get('position'),
            email:    get('email'),
            phone:    get('phone'),
            message:  get('message'),
        };

        // 必須値クライアント事前検証
        var headerH = (document.getElementById('header') || {}).offsetHeight || 85;
        var scrollToField = function(fieldName) {
            var step = form.querySelector('[name="' + fieldName + '"]');
            if (!step) return;
            var item = step.closest('.cfa_item') || step;
            var targetY = item.getBoundingClientRect().top + window.scrollY - headerH - 30;
            window.scrollTo({ top: targetY, behavior: 'smooth' });
            setTimeout(function() { step.focus(); }, 400);
        };

        if (!data.company) { alert('会社名を入力してください.'); scrollToField('company'); return; }
        if (!data.name)    { alert('担当者名を入力してください.'); scrollToField('manager'); return; }
        if (!data.email)   { alert('メールアドレスを入力してください。'); scrollToField('email'); return; }
        if (!isValidEmail(data.email)) { alert('メールアドレスの形式が正しくありません。\n例) example@company.com'); scrollToField('email'); return; }
        if (!data.message) { alert('お問い合わせ内容を入力してください。'); scrollToField('message'); return; }

        submitBtn.disabled = true;
        var txtEl = submitBtn.querySelector('.cfa_submit_txt');
        if (txtEl) txtEl.textContent = '送信中...';

        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify(data),
        })
        .then(function (res) {
            if (res.status === 422) {
                // Laravel validation エラーパース
                return res.json().then(function(json) {
                    var errors = json.errors || {};
                    var msg = '';
                    Object.keys(errors).forEach(function(field) {
                        msg += (errorMessages[field] || errors[field][0]) + '\n';
                    });
                    throw new Error(msg.trim() || '入力内容を確認してください。');
                });
            }
            if (!res.ok) {
                throw new Error('サーバーエラーが発生しました。しばらくしてからもう一度お試しください。');
            }
            return res.json();
        })
        .then(function () {
            form.querySelectorAll('.cfa_item').forEach(function (el) { el.style.display = 'none'; });
            submitBtn.style.display = 'none';
            var done = document.createElement('div');
            done.style.cssText = 'padding:40px 0; text-align:left;';
            done.innerHTML = '<p style="font-size:22px; font-weight:600; color:#fff; line-height:1.6;">お問い合わせが受理されました。<br><span style="font-size:16px; font-weight:400; color:rgba(255,255,255,0.6);">近日中に回答させていただきます。</span></p>';
            form.appendChild(done);

            // 成功メッセージが見えるように上端へスクロール
            var contactSection = document.getElementById('contact_main');
            var scrollTarget = contactSection || done;
            var headerH = (document.getElementById('header') || {}).offsetHeight || 85;
            var targetY = scrollTarget.getBoundingClientRect().top + window.scrollY - headerH - 20;
            window.scrollTo({ top: targetY, behavior: 'smooth' });
        })
        .catch(function (err) {
            submitBtn.disabled = false;
            submitBtn.classList.add('is-ready');
            if (txtEl) txtEl.textContent = 'お問い合わせ';
            alert(err.message);
        });
    });
});
</script>

</body>
</html>
