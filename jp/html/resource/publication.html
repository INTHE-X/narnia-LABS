 <!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARNIA LABS - PUBLICATION</title>

    <link rel="stylesheet" href="../../../assets/css/reset.css">
    <link rel="stylesheet" href="../../../assets/css/common.css">
    <link rel="stylesheet" href="../../../assets/css/style.css">
    <link rel="stylesheet" href="../../../assets/css/sub.css">
    <link rel="stylesheet" href="../../../assets/css/responsive.css">
     <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">

    <script src="../../../assets/js/common.js"></script>
    <script src="../../../assets/plugin/jquery.js"></script>
    <script src="../../../assets/js/sub.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/lenis@1.3.18/dist/lenis.min.js"></script> 
</head>
<body class="jp">
    <div id="wrap">
        <!-- include -->
        <header id="header"></header>

        <section id="publication">
            <div class="grid_deco">
                <div class="grid_deco_inner">
                </div>
            </div>
            <div class="container">
                <div class="pb_inner">
                    <div class="box left">
                        <div class="pb_tit">
                            <h2>publication</h2>
                        </div>
                        <div class="pb_filter filter_area">
                            <ul>
                                <li class="active">
                                    <button>
                                        <span>All</span>
                                    </button>
                                </li>
                                <li>
                                    <button>
                                        <span>International Journal Papers</span>
                                    </button>
                                </li>
                                <li>
                                    <button>
                                        <span>Korean Journal Papers</span>
                                    </button>
                                </li>
                            </ul>
                        </div>
                        <div class="pb_article_pagination">
                            <div class="pbap_inner">
                                <ul class="pbap_bullet_area" id="pb-bullet-list">
                                    <!-- APIで動적生成 -->
                                </ul>
                            </div>
                            <div class="custom_scrollbar">
                                <div class="scroll_thumb"></div>
                            </div>
                        </div>
                    </div>
                    <div class="box right">
                        <div class="pb_slide_box">
                            <div class="pb_slide_wrapper" id="pb-slide-wrapper">
                                <!-- APIで動적生成 -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </section>
        <!-- include -->
        <section id="request"></section>

        <!-- include -->
        <footer id="footer"></footer>
    </div>

<script>
(function () {
    var API_URL = 'https://narnialabs.mycafe24.com/admin/api/publications';
    var ARROW_IMG = '/assets/img/common/link_arrow_wh.svg';
    var allItems = [];
    var filtered = [];

    function buildBullet(items) {
        var ul = document.getElementById('pb-bullet-list');
        if (!ul) return;
        ul.innerHTML = items.map(function (item, i) {
            return '<li' + (i === 0 ? ' class="active"' : '') + ' data-idx="' + i + '">'
                + '<a href="javascript:void(0)">'
                + '<div class="pbap_bullet_inner">'
                + '<span class="cate">[ ' + item.category + ' ]</span>'
                + '<strong class="tit">' + (item.title_jp || item.title) + '</strong>'
                + '<p class="author">' + (item.author || '') + '</p>'
                + '</div></a></li>';
        }).join('');

        // クリックイベント
        ul.querySelectorAll('li').forEach(function (li) {
            li.addEventListener('click', function () {
                ul.querySelectorAll('li').forEach(function (l) { l.classList.remove('active'); });
                li.classList.add('active');
                activateSlide(parseInt(li.dataset.idx));
            });
        });
    }

    function buildSlides(items) {
        var wrapper = document.getElementById('pb-slide-wrapper');
        if (!wrapper) return;
        wrapper.innerHTML = items.map(function (item, i) {
            return '<article class="pb_slide' + (i === 0 ? ' active' : '') + '" data-idx="' + i + '">'
                + '<div class="pb_slide_inner">'
                + '<span class="cate">' + item.category + '</span>'
                + '<div class="txt">'
                + '<h3>' + (item.title_jp || item.title) + '</h3>'
                + '<span class="author">' + (item.author || '') + '</span>'
                + ((item.description_jp || item.description) ? '<p class="desc">' + (item.description_jp || item.description) + '</p>' : '')
                + (item.source ? '<p class="source">' + item.source + '</p>' : '')
                + '</div>'
                + '<div class="link"><a href="' + (item.link || '#') + '"' + (item.link ? ' target="_blank"' : '') + '>'
                + '<span>出版物へのリンク</span>'
                + '<i><img src="' + ARROW_IMG + '" alt="#"></i>'
                + '</a></div>'
                + '</div></article>';
        }).join('');
    }

    function activateSlide(idx) {
        document.querySelectorAll('#pb-slide-wrapper .pb_slide').forEach(function (el) {
            el.classList.remove('active');
        });
        var target = document.querySelector('#pb-slide-wrapper .pb_slide[data-idx="' + idx + '"]');
        if (target) target.classList.add('active');
    }

    function applyFilter(cat) {
        filtered = cat === 'All'
            ? allItems
            : allItems.filter(function (i) { return i.category === cat; });
        buildBullet(filtered);
        buildSlides(filtered);

        document.querySelectorAll('.pb_filter li').forEach(function (li) { li.classList.remove('active'); });
        document.querySelectorAll('.pb_filter li button span').forEach(function (span) {
            if (span.textContent.trim() === cat) span.closest('li').classList.add('active');
        });
    }

    // フィルタボタン連携
    document.querySelectorAll('.pb_filter li button').forEach(function (btn) {
        btn.addEventListener('click', function () {
            applyFilter(this.querySelector('span').textContent.trim());
        });
    });

    fetch(API_URL)
        .then(function (r) { return r.json(); })
        .then(function (items) {
            allItems = items;
            applyFilter('All');
        })
        .catch(function (err) { console.warn('Publication API ロード失敗:', err); });
})();
</script>

</body>
</html>
