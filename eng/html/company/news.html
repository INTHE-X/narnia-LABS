<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARNIA LABS - NEWS</title>

    <link rel="stylesheet" href="../../../assets/css/reset.css">
    <link rel="stylesheet" href="../../../assets/css/common.css">
    <link rel="stylesheet" href="../../../assets/css/style.css">
    <link rel="stylesheet" href="../../../assets/css/sub.css">
    <link rel="stylesheet" href="../../../assets/css/responsive.css">
     <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">

    <script src="../../../assets/js/common.js"></script>
    <script src="../../../assets/plugin/jquery.js"></script>
    <script src="../../../assets/js/sub.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/lenis@1.3.18/dist/lenis.min.js"></script>
</head>
<body class="eng">
    <div id="wrap">
        <!-- include -->
        <header id="header"></header>

        <section id="news_visual" class="type1">
            <div class="grid_deco">
                <div class="grid_deco_inner">
                    <div class="grid_line vrt vrt_dash pos_left"></div>
                    <div class="grid_line vrt vrt_dash pos_right"></div>
                    <div class="grid_line vrt pos_h_center"></div>
                    <div class="grid_line_bottom"></div>
                    <div class="cross_deco rb"></div>
                </div>
            </div>
            <div class="nw_cont">
                <div class="container">
                    <div class="nw_top">
                        <span></span>
                        <span>[Press]</span>
                        <div class="cross_deco lb"></div>
                        <div class="subPage_234_top_deco_absol">
                            <div class="txt">
                                <figure>
                                    <img src="../../../assets/img/common/deco_txt01_gray01.svg" alt="#">
                                </figure>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="container nv_container">
                <div class="nv_inner">
                    <div class="nv_box left">
                        <div class="tit_area">
                            <div class="deco_badge"><span>AI LABS</span></div>
                            <h2 class="tit">NEWS</h2>
                            <div class="tit_deco">
                                <figure><img src="../../../assets/img/common/deco_txt02_grd01.svg" alt="#"></figure>
                            </div>
                        </div>
                        <div class="nv_txt_slide_area">
                            <div class="swiper nv_txt_slide">
                                <div class="swiper-wrapper" id="news-txt-slides">
                                    <!-- Dynamically generated via API -->
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="nv_box right">
                        <div class="swiper nv_slide">
                            <div class="swiper-wrapper" id="news-img-slides">
                                <!-- Dynamically generated via API -->
                            </div>
                        </div>
                    </div>
                </div>
                <div class="nv_pagination">
                    <span class="nv_pag_current">01</span>
                    <div class="nv_pag_bar"><div class="nv_pag_ticks"></div><div class="nv_pag_fill"></div></div>
                    <span class="nv_pag_total">01</span>
                </div>
            </div>
        </section>
        <section id="news_list">
            <div class="grid_deco nbt">
                <div class="grid_deco_inner">
                    <div class="grid_line vrt vrt_dash pos_left"></div>
                    <div class="grid_line vrt vrt_dash pos_right"></div>
                    <div class="grid_line vrt pos_h_center"></div>
                </div>
            </div>
            <div class="nl_container container">
                <div class="nl_box left">
                    <div class="nl_filter_area">
                        <strong>FILTER</strong>
                        <ul id="news-year-filter">
                            <li class="active"><a href="javascript:void(0)" data-year="All">All</a></li>
                            <!-- Year filter dynamically generated after API response -->
                        </ul>
                    </div>
                    <div class="news_list_floor" id="news-list-left"></div>
                </div>
                <div class="nl_box right">
                    <div class="news_list_floor" id="news-list-right"></div>
                </div>
                <div class="view_more" id="news-viewmore" style="display:none;">
                    <a href="javascript:void(0)" id="news-more-btn">Load More</a>
                </div>
            </div>
        </section>

        <!-- include -->
        <section id="request"></section>

        <!-- include -->
        <footer id="footer"></footer>
    </div>

<script>
(function () {
    var API_URL = 'https://narnialabs.mycafe24.com/admin/api/news';
    var FALLBACK_IMG = '/assets/img/sub/news_slide01.png';
    var FALLBACK_LIST = '/assets/img/sub/news_list01.png';
    var PAGE_SIZE = 8;
    var allItems = [];
    var filtered = [];
    var shown = 0;

    function imgSrc(item, fallback) {
        return item.image_url || fallback;
    }

    /* ── Top visual slide ── */
    function buildVisualSlides(featured) {
        if (!featured.length) return;
        var txtWrapper = document.getElementById('news-txt-slides');
        var imgWrapper = document.getElementById('news-img-slides');
        if (!txtWrapper || !imgWrapper) return;

        txtWrapper.innerHTML = featured.map(function (item) {
            return '<div class="swiper-slide"><div class="nvts_inner"><div class="desc">'
                + '<span class="date">' + (item.date || '') + '</span>'
                + '<h3 class="tit">' + item.title + '</h3>'
                + '<a href="' + (item.link || '#') + '"' + (item.link ? ' target="_blank"' : '') + ' class="link">[   Read Article  →   ]</a>'
                + '</div></div></div>';
        }).join('');

        imgWrapper.innerHTML = featured.map(function (item) {
            return '<div class="swiper-slide">'
                + '<div class="img"><figure><img src="' + imgSrc(item, FALLBACK_IMG) + '" alt="News image"></figure></div>'
                + '<span class="nv_slide_status"></span></div>';
        }).join('');

        // Reinitialize Swiper (refresh nv_txt_slide / nv_slide instances in sub.js)
        if (window.nvTxtSwiper && typeof window.nvTxtSwiper.update === 'function') {
            window.nvTxtSwiper.update();
        }
        if (window.nvImgSwiper && typeof window.nvImgSwiper.update === 'function') {
            window.nvImgSwiper.update();
        }
    }

    /* ── Bottom list ── */
    function buildCard(item) {
        return '<article class="news_list_content">'
            + '<a href="' + (item.link || '#') + '"' + (item.link ? ' target="_blank"' : '') + '>'
            + '<div class="img"><figure><img src="' + imgSrc(item, FALLBACK_LIST) + '" alt="#"></figure></div>'
            + '<div class="desc">'
            + '<div class="cate"><span>' + item.category + '</span><span>' + (item.date || '') + '</span></div>'
            + '<h3 class="tit">' + item.title + '</h3>'
            + (item.source ? '<span class="link_desc">' + item.source + '</span>' : '')
            + '</div></a></article>';
    }

    function renderList(append) {
        var leftEl  = document.getElementById('news-list-left');
        var rightEl = document.getElementById('news-list-right');
        if (!leftEl || !rightEl) return;

        var batch = filtered.slice(shown, shown + PAGE_SIZE);
        if (!append) { leftEl.innerHTML = ''; rightEl.innerHTML = ''; }

        batch.forEach(function (item, i) {
            var html = buildCard(item);
            if ((shown + i) % 2 === 0) leftEl.innerHTML += html;
            else rightEl.innerHTML += html;
        });

        shown += batch.length;

        var moreEl = document.getElementById('news-viewmore');
        if (moreEl) moreEl.style.display = shown < filtered.length ? '' : 'none';
    }

    /* ── Year filter ── */
    function buildYearFilter(years) {
        var ul = document.getElementById('news-year-filter');
        if (!ul) return;
        var existing = ul.querySelector('[data-year="All"]');
        ul.innerHTML = '';
        var allLi = document.createElement('li');
        allLi.className = 'active';
        allLi.innerHTML = '<a href="javascript:void(0)" data-year="All">All</a>';
        ul.appendChild(allLi);
        years.forEach(function (y) {
            var li = document.createElement('li');
            li.innerHTML = '<a href="javascript:void(0)" data-year="' + y + '">' + y + '</a>';
            ul.appendChild(li);
        });
        ul.querySelectorAll('a').forEach(function (a) {
            a.addEventListener('click', function () {
                ul.querySelectorAll('li').forEach(function (l) { l.classList.remove('active'); });
                this.parentElement.classList.add('active');
                applyFilter(this.dataset.year);
            });
        });
    }

    function applyFilter(year) {
        filtered = year === 'All'
            ? allItems
            : allItems.filter(function (i) { return i.year === year; });
        shown = 0;
        renderList(false);
    }

    /* ── Load More ── */
    var moreBtn = document.getElementById('news-more-btn');
    if (moreBtn) { moreBtn.addEventListener('click', function () { renderList(true); }); }

    /* ── API Fetch ── */
    fetch(API_URL)
        .then(function (r) { return r.json(); })
        .then(function (items) {
            allItems = items;

            // Top slide (is_featured)
            var featured = items.filter(function (i) { return i.is_featured; });
            buildVisualSlides(featured);

            // Extract year list
            var years = [...new Set(items.map(function (i) { return i.year; }).filter(Boolean))].sort().reverse();
            buildYearFilter(years);

            applyFilter('All');
        })
        .catch(function (err) { console.warn('News API load failed:', err); });
})();
</script>

</body>
</html>
