 <!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARNIA LABS - CASE STUDIES</title>

    <link rel="stylesheet" href="../../../assets/css/reset.css">
    <link rel="stylesheet" href="../../../assets/css/common.css">
    <link rel="stylesheet" href="../../../assets/css/style.css">
    <link rel="stylesheet" href="../../../assets/css/sub.css">
    <link rel="stylesheet" href="../../../assets/css/responsive.css">
     <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">

    <script src="../../../assets/js/common.js"></script>
    <script src="../../../assets/plugin/jquery.js"></script>
    <script src="../../../assets/js/sub.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/lenis@1.3.18/dist/lenis.min.js"></script> 
</head>
<body class="eng">
    <div id="wrap">
        <!-- include -->
        <header id="header"></header>

        <section id="case_studies_main">
            <div class="grid_deco">
                <div class="grid_deco_inner">
                    <div class="grid_line vrt vrt_dash pos_left"></div>
                    <div class="grid_line vrt vrt_dash pos_right"></div>
                    <div class="grid_line hrz pos_bot"></div>
                </div>
            </div>
            <div class="csd_top_deco">
                <div class="container">
                    <div class="subPage_234_top_deco">
                        <div class="txt">
                            <figure>
                                <img src="../../../assets/img/common/deco_txt01_gray01.svg" alt="#">
                            </figure>
                        </div>
                    </div>
                </div>
                <div class="cross_deco csd_top_cross"></div>
            </div>
            <div class="csd_inner">
                <div class="box left">
                    <div class="case_main_left_deco">
                        <figure class="img">
                            <img src="../../../assets/img/sub/case_studies_main_deco01.png" alt="#">
                        </figure>
                        <div class="case_deco_ani">
                            <span>AI LABS</span>
                        </div>
                    </div>
                    <div class="vrt_dash_line"></div>
                </div>
                <div class="container csd_container">
                    <div class="csd_wrapper">
                        <div class="csdm_tit">
                            <h2>case studies</h2>
                        </div>
                        <div class="csd_swiper swiper">
                            <div class="swiper-wrapper" id="csd-slide-wrapper">
                                <!-- API로 동적 생성 -->
                            </div>
                            <div class="csd_pagination"></div>
                            <div class="blur_txtDeco">
                                <div class="inner">
                                    <div class="dots"></div>
                                    <div class="dots"></div>
                                    <figure>
                                        <img src="../../../assets/img/common/deco_txt01_wh.svg" alt="#">
                                    </figure>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="box right"></div>
            </div>
        </section>
        <section id="case_studies_list">
            <div class="grid_deco nbt">
                <div class="grid_deco_inner">
                    <div class="grid_line vrt vrt_dash pos_left"></div>
                    <div class="grid_line vrt vrt_dash pos_right"></div>
                    <div class="cross_deco color2 pos_lt"></div>
                </div>
            </div>
            <div class="csl_inner">
                <div class="box left">
                    <div class="csd_list_filter">
                        <ul>
                            <li data-csdl="automobile"><a href="javascript:void(0)">Automobile</a></li>
                            <li data-csdl="electronics"><a href="javascript:void(0)">Electronics</a></li>
                            <li data-csdl="others"><a href="javascript:void(0)">Others</a></li>
                        </ul>
                    </div>
                </div>
                <div class="container">
                    <div class="csdl_body" id="csd-list-body">
                        <!-- API로 동적 생성 -->
                    </div>
                </div>
            </div>
        </section>
        <!-- include -->
        <section id="request"></section>

        <!-- include -->
        <footer id="footer"></footer>
    </div>

<script>
(function() {
    var API_URL = 'https://narnialabs.mycafe24.com/admin/api/case-studies';
    var FALLBACK_IMG = '/assets/img/sub/case_studies_main_slide01.png';
    var ARROW_IMG = '/assets/img/common/arrow_3dots.svg';

    function imgSrc(item) {
        return item.image_url || FALLBACK_IMG;
    }

    function buildSlides(items) {
        var featured = items.filter(function(i){ return i.is_featured; });
        if (!featured.length) featured = items.slice(0, 3);
        var wrapper = document.getElementById('csd-slide-wrapper');
        if (!wrapper) return;

        wrapper.innerHTML = featured.map(function(item) {
            var tagsHtml = (item.tags || []).map(function(t){ return '<span>' + t + '</span>'; }).join('');
            return '<div class="swiper-slide"><div class="csd_slide_item">'
                + '<div class="img"><figure><img src="' + imgSrc(item) + '" alt="#"></figure></div>'
                + '<div class="txt_area">'
                + '<div class="cate">' + tagsHtml + '</div>'
                + '<h3 class="tit">' + (item.title_en || item.title) + '</h3>'
                + '<div class="link"><a href="' + (item.link || '#') + '"' + (item.link ? ' target="_blank"' : '') + '>Product Inquiry<i><img src="' + ARROW_IMG + '" alt="#"></i></a></div>'
                + '</div></div></div>';
        }).join('');

        // 기존 swiper 인스턴스 destroy 후 재초기화
        if (typeof Swiper !== 'undefined') {
            if (window.csdSwiper && typeof window.csdSwiper.destroy === 'function') {
                window.csdSwiper.destroy(true, true);
                window.csdSwiper = null;
            }
            window.csdSwiper = new Swiper('.csd_swiper', {
                slidesPerView: 1,
                effect: 'fade',
                fadeEffect: { crossFade: true },
                speed: 600,
                loop: featured.length > 1,
                autoplay: featured.length > 1 ? { delay: 6000, disableOnInteraction: false } : false,
                pagination: { el: '.csd_pagination', clickable: true },
            });
        }
    }

    function buildList(items) {
        var body = document.getElementById('csd-list-body');
        var filterEl = document.querySelector('.csd_list_filter ul');
        if (!body) return;

        // 카테고리별 그룹화
        var groups = {};
        items.forEach(function(item) {
            var cat = item.category;
            if (!groups[cat]) groups[cat] = [];
            groups[cat].push(item);
        });

        var cats = Object.keys(groups);
        if (!cats.length) {
            body.innerHTML = '<p style="padding:2rem;color:#888;">등록된 케이스스터디가 없습니다.</p>';
            return;
        }

        // 사이드바 필터 동적 생성
        if (filterEl) {
            filterEl.innerHTML = cats.map(function(cat) {
                return '<li data-csdl="' + cat.toLowerCase() + '"><a href="javascript:void(0)">' + cat + '</a></li>';
            }).join('');
        }

        body.innerHTML = cats.map(function(cat) {
            var catItems = groups[cat];
            var listHtml = catItems.map(function(item) {
                var tagsHtml = (item.tags || []).map(function(t){ return '<span>' + t + '</span>'; }).join('');
                return '<li><a href="caseStudiesDetail.html?id=' + item.id + '">'
                    + '<div class="csdl_inner">'
                    + '<div class="img"><figure><img src="' + imgSrc(item) + '" alt="#"></figure></div>'
                    + '<div class="desc"><h3>' + (item.title_en || item.title) + '</h3><div class="cate">' + tagsHtml + '</div></div>'
                    + '</div></a></li>';
            }).join('');

            return '<div class="csdl_item" data-csdl="' + cat.toLowerCase() + '">'
                + '<div class="csdl_top"><strong>' + catItems.length + '</strong><span class="cate">' + cat + '</span></div>'
                + '<div class="csdl_box"><ul class="csdl_area">' + listHtml + '</ul></div>'
                + '</div>';
        }).join('');
    }

    fetch(API_URL)
        .then(function(r){ return r.json(); })
        .then(function(items) {
            buildSlides(items);
            buildList(items);
        })
        .catch(function(err) {
            console.warn('Case Studies API 로드 실패:', err);
        });
})();
</script>

</body>
</html>
